displayName: GeoBlock With GeoJS.io
type: middleware

import: github.com/linkphoenix/geoblock-with-geojs-io

summary: "Block requests based on the client country using GeoJS.io"

testData:
  silentStartUp: false
  allowLocalRequests: false
  logLocalRequests: false
  logAllowedRequests: false
  logApiRequests: true
  api: "https://get.geojs.io/v1/ip/country/{ip}"
  apiTimeoutMs: 150
  cacheSize: 15
  forceMonthlyUpdate: true
  allowUnknownCountries: false
  unknownCountryApiResponse: "nil"
  countries:
    - CH
